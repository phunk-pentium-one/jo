<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tab-title">Detail Film</title>
  <link rel="stylesheet" href="../css/style.css">
  
      <style>
        /* Desain Kotak Video Player Lokal agar Pas di Laptop & HP */
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px auto;
            background-color: #000;
            border: 3px solid #ff0000; /* Bingkai merah khas Phunk Film */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>

</head>
<body>

  <!-- Panggil Menu Navbar -->
  <menu-navbar></menu-navbar>

  <main style="margin-top: 120px; padding: 0 7%; color: #fff;">
    
            <!-- KOTAK VIDEO PLAYER UTAMA -->
        <div class="video-container">
            <video id="film-player" controls>
            <source src="../video/aquaman.mp4" type="video/mp4">
            Browser Anda tidak mendukung pemutar video ini.
            </video>

        </div>


    <!-- Judul Film -->
    <h1 id="film-title" style="color: #ff0000; font-style: italic; margin-bottom: 20px;"></h1>
    
    <div style="display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 50px;">
      <!-- Tempat Foto Poster -->
      <img id="film-poster" src="" alt="Poster Film" style="width: 250px; height: 350px; object-fit: cover; border-radius: 8px; border: 2px solid #333;">
      
      <!-- Tempat Sinopsis -->
      <div style="max-width: 600px; flex: 1; min-width: 300px;">
        <h3>Sinopsis Film:</h3>
        <p id="film-synopsis" style="color: #aaa; margin-top: 10px; line-height: 1.6;"></p>
        
        <br>
        <p id="film-quality" style="color: #ff6600; font-weight: bold;"></p>
      </div>
    </div>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../components/data.js"></script>
  <script>
    // Robot pengambil ID film dari URL browser
    const urlParams = new URLSearchParams(window.location.search);
    const kodeFilm = urlParams.get('id');

    // Mengambil data dari file data.js
    const dataFilm = databaseFilm[kodeFilm];

    if (dataFilm) {
      // Menyuntikkan data teks dan gambar
      document.getElementById('tab-title').innerText = "Nonton " + dataFilm.judul;
      document.getElementById('film-title').innerText = dataFilm.judul;
      document.getElementById('film-poster').src = dataFilm.poster;
      document.getElementById('film-synopsis').innerText = dataFilm.sinopsis;
      document.getElementById('film-quality').innerText = "Kualitas: " + dataFilm.kualitas;
      
      // KUNCI UTAMA YOUTUBE EM-BED: Menyuntikkan link embed ke iframe
      // document.getElementById('film-player').src = dataFilm.videoUrl;
    } else {
      document.getElementById('film-title').innerText = "Film Tidak Ditemukan";
    }
  </script>
</body>
</html>
